name: Maintainer Issue (not for public use)
description: Only to be created by Electron maintainers
body:
- type: checkboxes
  attributes:
    label: Confirmation
    options:
      - label: I am a [maintainer](https://github.com/cptthura-alt/Run-it-/graphs/contributors) of this project. (If not, please create a [different issue type](https://github.com/cptthura-alt/Run-it-/issues/new/).)
        required: true
- type: textarea
  attributes:
    label: Description
  validations:
    required: true
